<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Rounded Card -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Flow Lines & Checkmark Graphic -->
  <g fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top Flow Line -->
    <path d="M140 180h120" opacity="0.6" />
    <!-- Middle Flow Line -->
    <path d="M140 260h80" opacity="0.8" />
    <!-- Bottom Flow Line -->
    <path d="M140 340h160" />
    
    <!-- Dynamic Checkmark representing completed flow -->
    <path d="M300 240 l40 40 80 -80" stroke-width="40" />
  </g>
</svg>